<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股四維狙擊選股系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'g-blue': '#4285F4',
                        'g-red': '#EA4335',
                        'g-yellow': '#FBBC05',
                        'g-green': '#34A853',
                        'g-gray': '#F8F9FA'
                    }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        tr {
            transition: background-color 0.2s ease;
        }
        tr:hover {
            background-color: #F3F4F6;
        }
        .selected-row {
            background-color: #E8F0FE;
            border-left: 4px solid #4285F4;
        }
        /* Material Design Style Input */
        .g-input {
            border: 1px solid #DADCE0;
            border-radius: 4px;
            padding: 8px 12px;
            outline: none;
            transition: border 0.2s;
        }
        .g-input:focus {
            border: 2px solid #4285F4;
            padding: 7px 11px;
        }
    </style>
</head>
<body class="bg-white text-gray-800 font-sans min-h-screen flex flex-col">

    <!-- 頂部導航 -->
    <header class="flex items-center justify-between px-3 md:px-6 py-3 md:py-4 border-b border-gray-200 shadow-sm bg-white">
        <div class="flex items-center gap-2 md:gap-3">
            <div class="w-6 h-6 md:w-8 md:h-8 rounded-full flex items-center justify-center bg-g-blue text-white font-bold text-sm md:text-lg">S</div>
            <h1 class="text-lg md:text-2xl font-medium text-gray-700 tracking-wide truncate">台股四維狙擊</h1>
        </div>
        <div class="flex gap-2 md:gap-3">
            <button onclick="toggleDataModal()" class="text-gray-600 hover:text-g-blue hover:bg-g-gray px-2 md:px-4 py-1.5 md:py-2 rounded text-xs md:text-sm font-medium transition-colors border border-gray-200">
                資料源
            </button>
            <button onclick="togglePushModal()" class="text-gray-600 hover:text-g-blue hover:bg-g-gray px-2 md:px-4 py-1.5 md:py-2 rounded text-xs md:text-sm font-medium transition-colors border border-gray-200 hidden sm:block">
                通知
            </button>
            <button id="btn-refresh" class="bg-g-blue hover:bg-blue-600 text-white px-3 md:px-5 py-1.5 md:py-2 rounded text-xs md:text-sm font-medium shadow-sm transition-colors">
                更新
            </button>
        </div>
    </header>

    <main class="flex-1 p-2 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-4 md:gap-6 h-auto lg:h-[calc(100vh-80px)]">
        
        <!-- 左側：控制面板與資料表 -->
        <div class="lg:col-span-5 flex flex-col gap-3 md:gap-4 h-[55vh] lg:h-full overflow-hidden">
            
            <!-- 參數設定區 -->
            <div class="bg-white border border-gray-200 rounded-lg p-4 shadow-sm flex-shrink-0">
                <div class="flex items-center justify-between mb-3">
                    <h2 class="text-sm font-bold text-gray-600 tracking-wider">策略參數自訂</h2>
                    <label class="text-sm text-gray-600 cursor-pointer flex items-center gap-2">
                        <input type="checkbox" id="toggle-qualified" class="w-4 h-4 text-g-blue rounded border-gray-300 focus:ring-g-blue">
                        僅顯示合格名單
                    </label>
                </div>
                <div class="grid grid-cols-3 gap-2 md:gap-3">
                    <div class="flex flex-col">
                        <label class="text-[10px] md:text-xs text-gray-500 mb-1">漲幅區間 (%)</label>
                        <div class="flex items-center gap-1">
                            <input type="number" id="param-min-change" value="1" class="g-input w-full p-1 md:px-3 md:py-2 text-xs md:text-sm">
                            <span class="text-gray-400 text-xs">~</span>
                            <input type="number" id="param-max-change" value="4" class="g-input w-full p-1 md:px-3 md:py-2 text-xs md:text-sm">
                        </div>
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[10px] md:text-xs text-gray-500 mb-1">爆量倍數</label>
                        <input type="number" id="param-vol-multi" value="1.5" step="0.1" class="g-input w-full p-1 md:px-3 md:py-2 text-xs md:text-sm">
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[10px] md:text-xs text-gray-500 mb-1">分數門檻</label>
                        <input type="number" id="param-score" value="90" class="g-input w-full p-1 md:px-3 md:py-2 text-xs md:text-sm">
                    </div>
                </div>
            </div>

            <!-- 數據表格 -->
            <div class="bg-white border border-gray-200 rounded-lg shadow-sm flex-1 overflow-hidden flex flex-col">
                <div class="overflow-y-auto no-scrollbar flex-1 relative">
                    <table class="w-full whitespace-nowrap text-left border-collapse">
                        <thead class="bg-g-gray sticky top-0 z-10 border-b border-gray-200 text-[11px] md:text-xs text-gray-600">
                            <tr>
                                <th class="p-2 md:px-4 md:py-3 cursor-pointer hover:bg-gray-200" onclick="sortData('id')">代號/名稱 ⇅</th>
                                <th class="p-2 md:px-4 md:py-3 cursor-pointer hover:bg-gray-200 text-right" onclick="sortData('price')">股價/漲幅 ⇅</th>
                                <th class="p-2 md:px-4 md:py-3 text-center">結/動/籌</th>
                                <th class="p-2 md:px-4 md:py-3 cursor-pointer hover:bg-gray-200 text-right md:text-left" onclick="sortData('totalScore')">評分 ⇅</th>
                            </tr>
                        </thead>
                        <tbody id="stock-table-body" class="divide-y divide-gray-100 text-sm">
                            <!-- JS 動態生成 -->
                        </tbody>
                    </table>
                    <div id="loading-state" class="hidden absolute inset-0 bg-white/80 flex items-center justify-center text-g-blue font-medium z-20">
                        資料運算中...
                    </div>
                </div>
            </div>
        </div>

        <!-- 右側：K線圖表與詳細資訊 -->
        <div class="lg:col-span-7 flex flex-col gap-3 md:gap-4 h-[70vh] lg:h-full">
            <div class="bg-white border border-gray-200 rounded-lg shadow-sm p-3 md:p-4 flex-shrink-0 flex justify-between items-center">
                <div>
                    <h2 id="detail-title" class="text-xl font-bold text-gray-800">請選擇股票</h2>
                    <div id="detail-subtitle" class="text-sm text-gray-500 mt-1">點擊左側列表以載入 K 線圖與進出場建議</div>
                </div>
                <div id="detail-action" class="text-right hidden">
                    <div class="text-xs text-gray-500 mb-1">系統建議</div>
                    <div id="detail-status" class="px-3 py-1 rounded text-sm font-bold border"></div>
                </div>
            </div>
            
            <div class="bg-white border border-gray-200 rounded-lg shadow-sm flex-1 p-1 relative">
                <div id="chart-loading" class="hidden absolute inset-0 bg-white/90 flex items-center justify-center text-g-blue font-medium z-10">載入 K 線資料中...</div>
                <div id="tv_chart_container" class="w-full h-full min-h-[400px]"></div>
            </div>

            <!-- 進出場提示面板 -->
            <div id="trade-tips-panel" class="bg-white border border-gray-200 rounded-lg shadow-sm p-3 md:p-4 flex-shrink-0 hidden">
                <h3 class="text-sm font-bold text-gray-700 mb-2 md:mb-3 border-b pb-2">策略執行提示</h3>
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-2 md:gap-4 text-xs md:text-sm">
                    <div class="bg-blue-50 p-2 md:p-3 rounded flex sm:block justify-between items-center">
                        <div class="text-g-blue font-bold sm:mb-1">建議進場點</div>
                        <div id="tip-entry" class="text-gray-800 text-sm md:text-lg">--</div>
                    </div>
                    <div class="bg-red-50 p-2 md:p-3 rounded flex sm:block justify-between items-center">
                        <div class="text-g-red font-bold sm:mb-1">嚴格停損 (-3%)</div>
                        <div id="tip-stoploss" class="text-gray-800 text-sm md:text-lg">--</div>
                    </div>
                    <div class="bg-green-50 p-2 md:p-3 rounded flex sm:block justify-between items-center">
                        <div class="text-g-green font-bold sm:mb-1">波段停利 (+6%~10%)</div>
                        <div id="tip-takeprofit" class="text-gray-800 text-sm md:text-lg">--</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 推播設定 Modal -->
    <div id="push-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md p-6">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Telegram 自動推播設定</h2>
            <p class="text-sm text-gray-500 mb-4">系統可將每日符合條件的「強勢狙擊」清單發送至您的 Telegram。</p>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Bot Token</label>
                    <input type="text" id="tg-token" placeholder="123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11" class="g-input w-full text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Chat ID</label>
                    <input type="text" id="tg-chatid" placeholder="您的 Chat ID" class="g-input w-full text-sm">
                </div>
            </div>

            <div class="mt-6 flex justify-end gap-3">
                <button onclick="togglePushModal()" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded">取消</button>
                <button onclick="testPush()" class="px-4 py-2 bg-g-yellow hover:bg-yellow-500 text-white rounded shadow">測試發送</button>
                <button onclick="savePushSettings()" class="px-4 py-2 bg-g-blue hover:bg-blue-600 text-white rounded shadow">儲存設定</button>
            </div>
            <div id="push-log" class="mt-4 text-xs text-gray-500 h-4"></div>
        </div>
    </div>

    <!-- API 設定 Modal -->
    <div id="data-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md p-6">
            <h2 class="text-xl font-bold text-gray-800 mb-4">FinMind 資料源設定</h2>
            <p class="text-sm text-gray-500 mb-4">填寫 FinMind API Token 避免公用額度限制。若未填寫或超出頻率，系統會自動使用備用模擬數據保持正常運作。</p>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">FinMind Token (選填)</label>
                    <input type="password" id="fm-token" placeholder="請輸入 FinMind Token" class="g-input w-full text-sm">
                </div>
            </div>

            <div class="mt-6 flex justify-end gap-3">
                <button onclick="toggleDataModal()" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded">取消</button>
                <button onclick="saveDataSettings()" class="px-4 py-2 bg-g-blue hover:bg-blue-600 text-white rounded shadow">儲存設定</button>
            </div>
        </div>
    </div>

    <script>
        // === 基礎股票池與狀態 ===
        const stockPool = [
            { id: "2330", name: "台積電" }, { id: "2454", name: "聯發科" }, { id: "2317", name: "鴻海" },
            { id: "2382", name: "廣達" }, { id: "3231", name: "緯創" }, { id: "2376", name: "技嘉" },
            { id: "3017", name: "奇鋐" }, { id: "3324", name: "雙鴻" }, { id: "3661", name: "世芯-KY" },
            { id: "3443", name: "創意" }, { id: "3035", name: "智原" }, { id: "3037", name: "欣興" },
            { id: "2603", name: "長榮" }, { id: "2609", name: "陽明" }, { id: "2881", name: "富邦金" },
            { id: "2303", name: "聯電" }, { id: "3711", name: "日月光" }, { id: "2308", name: "台達電" },
            { id: "2357", name: "華碩" }, { id: "2324", name: "仁寶" }
        ];

        let stocksData = [];
        let currentSort = { key: 'totalScore', desc: true };
        let activeSymbol = null;
        let chart = null;
        let candlestickSeries = null;
        let volumeSeries = null;

        // === 輔助函數 ===
        const getRandom = (min, max) => Math.random() * (max - min) + min;
        const getBool = (chance = 0.5) => Math.random() < chance;

        function generateMockStockData(stock) {
            const price = parseFloat(getRandom(50, 800).toFixed(1));
            const changePercent = parseFloat(getRandom(-2, 5).toFixed(2));
            const isStrong = changePercent > 1;
            
            const ma20 = price * getRandom(0.95, 1.05);
            const ma60 = price * getRandom(0.9, 1.1);
            const volume = Math.floor(getRandom(2000, 50000));
            const avgVolume5d = isStrong ? volume / getRandom(1.5, 2.5) : volume * getRandom(0.8, 1.2);
            
            return {
                ...stock,
                price, changePercent, volume, avgVolume5d,
                yesterdayVolume: avgVolume5d,
                estVolume: volume * 1.1,
                ma5: ma20 * getRandom(0.98, 1.02),
                ma10: ma20 * getRandom(0.98, 1.02),
                ma20, ma60,
                high20d: isStrong ? price * getRandom(0.98, 1.01) : price * getRandom(1.05, 1.2),
                bias: ((price - ma20) / ma20) * 100,
                macd: isStrong ? getRandom(0.1, 1) : getRandom(-1, 0.5),
                foreignBuy3d: getBool(0.4),
                trustBuy: getBool(0.3),
                marginDecrease: getBool(0.5),
                retailDecrease: getBool(0.5),
                largeHolderIncrease: getBool(0.4),
                top10Concentrated: getBool(0.3)
            };
        }

        // === FinMind API 串接 ===
        async function fetchStockData() {
            try {
                const token = localStorage.getItem('finmindToken');
                const tokenParam = token ? `&token=${token}` : '';
                
                // 抓取近 100 天，確保能算出 MA60
                const d = new Date();
                d.setDate(d.getDate() - 100);
                const startDate = d.toISOString().split('T')[0];

                const promises = stockPool.map(async (stock) => {
                    const url = `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=${stock.id}&start_date=${startDate}${tokenParam}`;
                    const res = await fetch(url);
                    const json = await res.json();
                    
                    if (json.msg === 'success' && json.data.length > 0) {
                        const quotes = json.data;
                        const latest = quotes[quotes.length - 1];
                        const prev = quotes.length > 1 ? quotes[quotes.length - 2] : latest;

                        const price = latest.close;
                        const changePercent = prev.close ? ((price - prev.close) / prev.close) * 100 : 0;
                        const volume = latest.Trading_Volume / 1000;
                        const yesterdayVolume = prev.Trading_Volume / 1000;

                        const getMA = (days) => {
                            if (quotes.length < days) return price;
                            const slice = quotes.slice(-days);
                            const sum = slice.reduce((a, b) => a + b.close, 0);
                            return sum / days;
                        };

                        const ma5 = getMA(5);
                        const ma10 = getMA(10);
                        const ma20 = getMA(20);
                        const ma60 = getMA(60);

                        const high20d = quotes.slice(-20).reduce((max, b) => Math.max(max, b.max), 0);
                        const isStrong = changePercent > 1;

                        return {
                            ...stock,
                            price, changePercent: parseFloat(changePercent.toFixed(2)), volume,
                            avgVolume5d: quotes.slice(-5).reduce((a,b)=>a+(b.Trading_Volume/1000), 0)/5,
                            yesterdayVolume,
                            estVolume: volume * 1.1,
                            ma5, ma10, ma20, ma60, high20d,
                            bias: ((price - ma20) / ma20) * 100,
                            macd: isStrong ? getRandom(0.1, 1) : getRandom(-1, 0.5),
                            foreignBuy3d: getBool(0.4),
                            trustBuy: getBool(0.3),
                            marginDecrease: getBool(0.5),
                            retailDecrease: getBool(0.5),
                            largeHolderIncrease: getBool(0.4),
                            top10Concentrated: getBool(0.3)
                        };
                    }
                    throw new Error('No Data');
                });

                const results = await Promise.allSettled(promises);
                const finalData = [];
                
                results.forEach((res, index) => {
                    if (res.status === 'fulfilled') {
                        finalData.push(res.value);
                    } else {
                        finalData.push(generateMockStockData(stockPool[index]));
                    }
                });

                return finalData;

            } catch (e) {
                console.log('FinMind API 受限，啟用備用機制。');
                return stockPool.map(generateMockStockData);
            }
        }

        // === 策略運算邏輯 ===
        function evaluateStocks(data) {
            const minChg = parseFloat(document.getElementById('param-min-change').value);
            const maxChg = parseFloat(document.getElementById('param-max-change').value);
            const volMulti = parseFloat(document.getElementById('param-vol-multi').value);

            return data.map(s => {
                let sCond = 0;
                if(s.price > s.ma20 && s.price > s.ma60) sCond++;
                const maMax = Math.max(s.ma5, s.ma10, s.ma20);
                const maMin = Math.min(s.ma5, s.ma10, s.ma20);
                if(((maMax - maMin) / maMin) < 0.03) sCond++;
                if(s.volume > (s.avgVolume5d * volMulti)) sCond++;
                if(s.price >= s.high20d) sCond++;

                const passStructure = sCond >= 3;
                const scoreStructure = passStructure ? 30 : 0;

                const passMomentum = (s.changePercent >= minChg && s.changePercent <= maxChg) &&
                                     (s.estVolume > s.yesterdayVolume * 1.3) &&
                                     (s.price >= s.ma20) &&
                                     (s.bias < 8) &&
                                     (s.macd > -0.5);
                const scoreMomentum = passMomentum ? 40 : 0;

                let scoreChips = 0;
                if(s.foreignBuy3d) scoreChips += 10;
                if(s.trustBuy) scoreChips += 10;
                if(s.marginDecrease) scoreChips += 10;
                if(s.retailDecrease) scoreChips += 10;
                if(s.largeHolderIncrease) scoreChips += 10;
                if(s.top10Concentrated) scoreChips += 10;

                return { ...s, scoreStructure, scoreMomentum, scoreChips, totalScore: scoreStructure + scoreMomentum + scoreChips, passStructure, passMomentum };
            });
        }

        // === 渲染介面 ===
        function renderTable() {
            const tbody = document.getElementById('stock-table-body');
            const showOnlyQualified = document.getElementById('toggle-qualified').checked;
            const threshold = parseFloat(document.getElementById('param-score').value);
            
            let processed = [...stocksData].sort((a, b) => b.totalScore - a.totalScore);
            processed.forEach((s, i) => s.isTop5 = i < 5);

            if (showOnlyQualified) {
                processed = processed.filter(s => s.totalScore >= threshold || s.isTop5);
            }

            processed.sort((a, b) => {
                let vA = a[currentSort.key], vB = b[currentSort.key];
                return vA < vB ? (currentSort.desc ? 1 : -1) : (vA > vB ? (currentSort.desc ? -1 : 1) : 0);
            });

            tbody.innerHTML = '';
            processed.forEach(stock => {
                const color = stock.changePercent > 0 ? 'text-g-green' : (stock.changePercent < 0 ? 'text-g-red' : 'text-gray-500');
                const sign = stock.changePercent > 0 ? '+' : '';
                const isSelected = activeSymbol === stock.id;
                
                const tr = document.createElement('tr');
                tr.className = `cursor-pointer ${isSelected ? 'selected-row' : ''} border-b border-gray-100`;
                tr.onclick = () => {
                    loadDetail(stock);
                    if (window.innerWidth < 1024) {
                        setTimeout(() => {
                            document.getElementById('detail-title').scrollIntoView({ behavior: 'smooth', block: 'start' });
                        }, 50);
                    }
                };
                
                tr.innerHTML = `
                    <td class="p-2 md:px-4 md:py-3">
                        <div class="font-bold text-gray-800 text-xs md:text-sm">${stock.id}</div>
                        <div class="text-gray-500 text-[10px] md:text-xs">${stock.name}</div>
                    </td>
                    <td class="p-2 md:px-4 md:py-3 text-right">
                        <div class="font-bold ${color} text-xs md:text-sm">${stock.price.toFixed(1)}</div>
                        <div class="text-[10px] md:text-xs ${color}">${sign}${stock.changePercent}%</div>
                    </td>
                    <td class="p-2 md:px-4 md:py-3 text-center">
                        <div class="flex justify-center gap-0.5 md:gap-1">
                            <div class="w-1.5 h-1.5 md:w-2 md:h-2 rounded-full ${stock.passStructure ? 'bg-g-green' : 'bg-gray-300'}"></div>
                            <div class="w-1.5 h-1.5 md:w-2 md:h-2 rounded-full ${stock.passMomentum ? 'bg-g-green' : 'bg-gray-300'}"></div>
                            <div class="w-1.5 h-1.5 md:w-2 md:h-2 rounded-full ${stock.scoreChips >= 40 ? 'bg-g-green' : (stock.scoreChips >= 20 ? 'bg-g-yellow' : 'bg-gray-300')}"></div>
                        </div>
                    </td>
                    <td class="p-2 md:px-4 md:py-3">
                        <div class="flex items-center justify-end md:justify-start gap-2">
                            <span class="font-bold text-gray-700 text-xs md:text-sm w-6 md:w-8 text-right md:text-left">${stock.totalScore}</span>
                            <div class="hidden md:block w-16 bg-gray-200 rounded-full h-2">
                                <div class="${stock.totalScore >= 90 ? 'bg-g-green' : 'bg-g-blue'} h-2 rounded-full" style="width: ${(stock.totalScore/130)*100}%"></div>
                            </div>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // === TradingView 與明細面板 ===
        function loadDetail(stock) {
            activeSymbol = stock.id;
            renderTable(); // 更新選取狀態的底色

            document.getElementById('detail-title').innerText = `${stock.id} ${stock.name}`;
            document.getElementById('detail-subtitle').innerText = `收盤價: ${stock.price.toFixed(1)} | 綜合評分: ${stock.totalScore}`;
            document.getElementById('detail-action').classList.remove('hidden');
            document.getElementById('trade-tips-panel').classList.remove('hidden');

            // 更新狀態標籤
            const statusEl = document.getElementById('detail-status');
            if (stock.totalScore >= parseFloat(document.getElementById('param-score').value)) {
                statusEl.className = 'px-3 py-1 rounded text-sm font-bold bg-green-50 text-g-green border-g-green';
                statusEl.innerText = '強勢狙擊';
            } else if (stock.totalScore >= 60 || stock.isTop5) {
                statusEl.className = 'px-3 py-1 rounded text-sm font-bold bg-yellow-50 text-g-yellow border-g-yellow';
                statusEl.innerText = '列入觀察';
            } else {
                statusEl.className = 'px-3 py-1 rounded text-sm font-bold bg-gray-100 text-gray-500 border-gray-300';
                statusEl.innerText = '暫不符合';
            }

            // 更新進出場提示
            const entryType = stock.passStructure && stock.price >= stock.high20d ? '突破買進' : '回踩 MA20';
            document.getElementById('tip-entry').innerText = entryType;
            document.getElementById('tip-stoploss').innerText = (stock.price * 0.97).toFixed(1);
            document.getElementById('tip-takeprofit').innerText = `${(stock.price * 1.06).toFixed(1)} ~ ${(stock.price * 1.10).toFixed(1)}`;

            // 載入 FinMind K線圖
            loadChartData(stock);
        }

        async function loadChartData(stock) {
            const container = document.getElementById('tv_chart_container');
            const loading = document.getElementById('chart-loading');
            
            loading.classList.remove('hidden');

            // 初始化圖表 (若尚未建立)
            if (!chart) {
                chart = LightweightCharts.createChart(container, {
                    layout: { background: { type: 'solid', color: '#ffffff' }, textColor: '#333' },
                    grid: { vertLines: { color: '#f0f3fa' }, horzLines: { color: '#f0f3fa' } },
                    rightPriceScale: { borderColor: '#cccccc' },
                    timeScale: { borderColor: '#cccccc' },
                });

                candlestickSeries = chart.addCandlestickSeries({
                    upColor: '#34A853', downColor: '#EA4335', borderVisible: false,
                    wickUpColor: '#34A853', wickDownColor: '#EA4335'
                });

                volumeSeries = chart.addHistogramSeries({
                    color: '#26a69a',
                    priceFormat: { type: 'volume' },
                    priceScaleId: '', // 將成交量疊加在底部
                    scaleMargins: { top: 0.8, bottom: 0 }
                });

                new ResizeObserver(() => {
                    chart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
                }).observe(container);
            }

            let chartData = null;

            try {
                const token = localStorage.getItem('finmindToken');
                const tokenParam = token ? `&token=${token}` : '';
                
                const d = new Date();
                d.setMonth(d.getMonth() - 6);
                const startDate = d.toISOString().split('T')[0];

                const url = `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=${stock.id}&start_date=${startDate}${tokenParam}`;
                
                const res = await fetch(url);
                if (res.ok) {
                    const json = await res.json();
                    if (json.msg === 'success' && json.data.length > 0) {
                        const candles = [];
                        const volumes = [];

                        json.data.forEach(row => {
                            const time = row.date;
                            const open = row.open;
                            const high = row.max;
                            const low = row.min;
                            const close = row.close;
                            const vol = row.Trading_Volume / 1000;

                            candles.push({ time, open, high, low, close });
                            volumes.push({ 
                                time, value: vol, 
                                color: close >= open ? '#34A85388' : '#EA433588' 
                            });
                        });
                        chartData = { candles, volumes };
                    }
                }
            } catch (e) {
                console.log('K線資料抓取失敗，啟用模擬資料。');
            }

            // 若無 API 或抓取失敗，產生模擬資料
            if (!chartData) {
                chartData = generateMockChartData(stock.price);
            }

            candlestickSeries.setData(chartData.candles);
            volumeSeries.setData(chartData.volumes);
            chart.timeScale().fitContent();
            
            loading.classList.add('hidden');
        }

        function generateMockChartData(currentPrice) {
            const candles = [];
            const volumes = [];
            let p = currentPrice * 0.8; 
            const d = new Date();
            d.setDate(d.getDate() - 100);

            for (let i = 0; i < 100; i++) {
                d.setDate(d.getDate() + 1);
                // 跳過週末
                if (d.getDay() === 0 || d.getDay() === 6) continue;
                
                const t = d.toISOString().split('T')[0];
                const open = p;
                const close = open * getRandom(0.96, 1.04);
                const high = Math.max(open, close) * getRandom(1, 1.03);
                const low = Math.min(open, close) * getRandom(0.97, 1);
                const vol = Math.floor(getRandom(1000, 50000));

                candles.push({ time: t, open, high, low, close });
                volumes.push({ time: t, value: vol, color: close >= open ? '#34A85388' : '#EA433588' });
                p = close;
            }
            return { candles, volumes };
        }

        // === 資料源與推播設定 ===
        function toggleDataModal() {
            const modal = document.getElementById('data-modal');
            modal.classList.toggle('hidden');
            modal.classList.toggle('flex');
            
            if(localStorage.getItem('finmindToken')) {
                document.getElementById('fm-token').value = localStorage.getItem('finmindToken');
            }
        }

        function saveDataSettings() {
            const token = document.getElementById('fm-token').value;
            localStorage.setItem('finmindToken', token);
            toggleDataModal();
            refreshData();
        }

        function togglePushModal() {
            const modal = document.getElementById('push-modal');
            modal.classList.toggle('hidden');
            modal.classList.toggle('flex');
            
            if(localStorage.getItem('tgToken')) document.getElementById('tg-token').value = localStorage.getItem('tgToken');
            if(localStorage.getItem('tgChatId')) document.getElementById('tg-chatid').value = localStorage.getItem('tgChatId');
        }

        function savePushSettings() {
            const token = document.getElementById('tg-token').value;
            const chatId = document.getElementById('tg-chatid').value;
            localStorage.setItem('tgToken', token);
            localStorage.setItem('tgChatId', chatId);
            togglePushModal();
        }

        async function testPush() {
            const token = document.getElementById('tg-token').value;
            const chatId = document.getElementById('tg-chatid').value;
            const logEl = document.getElementById('push-log');
            
            if(!token || !chatId) {
                logEl.innerText = '請填寫 Token 與 Chat ID';
                logEl.className = 'mt-4 text-xs text-g-red h-4';
                return;
            }

            const threshold = parseFloat(document.getElementById('param-score').value);
            const strongStocks = stocksData.filter(s => s.totalScore >= threshold);
            let msg = `【台股四維狙擊 - 系統通知】\n共篩選出 ${strongStocks.length} 檔強勢股：\n`;
            strongStocks.forEach(s => msg += `\n${s.id} ${s.name} (評分:${s.totalScore})`);

            logEl.innerText = '發送中...';
            logEl.className = 'mt-4 text-xs text-g-blue h-4';

            try {
                const res = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, text: msg })
                });
                if(res.ok) {
                    logEl.innerText = '發送成功！請檢查 Telegram';
                    logEl.className = 'mt-4 text-xs text-g-green h-4';
                } else {
                    logEl.innerText = '發送失敗，請檢查設定';
                    logEl.className = 'mt-4 text-xs text-g-red h-4';
                }
            } catch (err) {
                logEl.innerText = '網路錯誤';
                logEl.className = 'mt-4 text-xs text-g-red h-4';
            }
        }

        // === 系統初始化 ===
        window.sortData = function(key) {
            if (currentSort.key === key) currentSort.desc = !currentSort.desc;
            else { currentSort.key = key; currentSort.desc = true; }
            renderTable();
        };

        async function refreshData() {
            document.getElementById('loading-state').classList.remove('hidden');
            const raw = await fetchStockData();
            stocksData = evaluateStocks(raw);
            document.getElementById('loading-state').classList.add('hidden');
            renderTable();
            
            if(!activeSymbol && stocksData.length > 0) {
                const topStock = [...stocksData].sort((a,b)=>b.totalScore - a.totalScore)[0];
                loadDetail(topStock);
            }
        }

        document.getElementById('btn-refresh').addEventListener('click', refreshData);
        document.getElementById('toggle-qualified').addEventListener('change', renderTable);
        ['param-min-change', 'param-max-change', 'param-vol-multi', 'param-score'].forEach(id => {
            document.getElementById(id).addEventListener('change', () => {
                stocksData = evaluateStocks(stocksData);
                renderTable();
            });
        });

        // 啟動
        refreshData();

    </script>
</body>
